# Instance config for THIS install. Machine-local; not shared across machines.
# Secrets (the GitHub token) come from the environment (HARNESS_GITHUB_TOKEN),
# never from this file. See harness.toml.example for the documented template.
schema_version = 1

[instance]
instance_id = "WindowsDesktop"      # the partition key; a project's owner_instance must match
display_name = "dev-harness (local demo)"
platform = "windows"                 # informational only — the engine never branches on it

[github]
account = "ParthivNair"
repo = "ParthivNair/dev-harness"     # informational only today; the loops use each project's own repo
api_base = "https://api.github.com"
use_in_memory_fake = false           # false = real GitHub via PyGithub + HARNESS_GITHUB_TOKEN

[state_store]
backend = "json"                     # one atomic JSON file per run (M1); sqlite later
root = ".harness"                    # relative to this file's directory

[notifier]
selection = "file"                   # "file" (durable exit-and-resume) | "console" (interactive)
log_path = ".harness/notifications.log"
inbox = ".harness/inbox"

# --- Autonomy taxonomy: action name -> tier (autonomous | gated | forbidden) ---
[autonomy]
run_tests = "autonomous"
open_draft_pr = "autonomous"
file_issue = "autonomous"
set_labels = "autonomous"
assign_issue = "autonomous"
review_pr = "autonomous"            # posting a PR review/comment is low-risk
verify_gate = "gated"               # mid-run human "perceive the result" gate (DAW-safe default)
mark_pr_ready = "gated"             # draft -> ready crosses into human territory
dependency_change = "gated"
schema_change = "gated"
# merge_to_main stays forbidden in the INSTANCE default — the draft-PR + human-merge
# ceiling holds for every repo unless that repo opts in via its own harness.project.toml
# ([overrides.autonomy] merge_to_main = "gated" | "autonomous").
merge_to_main = "forbidden"
force_push = "forbidden"

[circuit_breakers]
max_iterations = 5
spend_ceiling_usd = 25.0       # per-run cap — one opus generate runs ~$7-15; leave room for build/test retries
spend_is_hard_stop = true

# The scheduler (drives `harness tick` / `harness watch`). Off by default; the
# demo runs loops manually. Flip enabled + use_in_memory_fake=false to go live.
[scheduling]
enabled = false
tick_interval_seconds = 300
max_concurrent_runs = 2
global_spend_ceiling_usd = 100.0     # shared daily cap across all runs (opus is ~$7-15/issue)
spend_window = "daily"

# --- Registered projects: pointers to per-repo configs ---
[[projects]]
id = "sample"
path = "examples/sample-project"

# Dogfooding: the harness manages itself. Its per-project config is ./harness.project.toml.
[[projects]]
id = "dev-harness"
path = "."
