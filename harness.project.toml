# The harness as a managed project OF ITSELF (dogfooding). The repo root IS the
# managed repo: the dev loop proposes the harness's own next milestone as a DRAFT PR,
# and the pr_review loop reviews + (per the opt-in below) MERGES it — closing the loop.
# The pytest suite is the `test` step, i.e. the self-modification safety net.
schema_version = 1

[project]
id = "dev-harness"
display_name = "dev-harness (self-managed)"
repo = "ParthivNair/dev-harness"
owner_instance = "WindowsDesktop"    # the Windows install owns it; the Mac reads it
description = "The harness manages its own next milestone — and (opted in) reviews + merges its own wave PRs."

[commands]
build = ["uv", "run", "python", "-c", "import harness"]   # import smoke
test = ["uv", "run", "pytest", "-q"]                        # the real suite = the safety net
cwd = "."

[prompts]
root = ".harness/prompts"
dev_task = ".harness/prompts/dev_task.md"
arch_review = ".harness/prompts/arch_review.md"
pr_review = ".harness/prompts/pr_review.md"
triage = ".harness/prompts/triage.md"

[scheduling]
priority = "normal"
min_poll_interval_seconds = 1800       # at most every 30 min
loops = ["dev_task"]
arch_review_cadence_seconds = 86400    # review itself ~daily, files its own tickets
triage_cadence_seconds = 3600          # groom the backlog hourly: refine sev:/effort: labels
pr_review_cadence_seconds = 1800       # review + merge its own aggregated wave PR every ~30 min
pr_merge_method = "squash"             # how a merged wave PR lands on main

[claude]
model = "claude-opus-4-8"
permission_mode = "acceptEdits"
# Belt-and-suspenders alongside the structural guard: the loop never commits/pushes;
# it edits the working tree and the harness opens the draft PR via the GitHub API.
disallowed_tools = ["Bash(git push:*)", "Bash(git commit:*)"]

# This repo is SELF-MANAGED: it is reviewed at the (wave) PR by the pr_review agent,
# not via a mid-run human gate. So it opts the normally-gated actions into autonomous —
# overriding ONLY for this project; the instance defaults in harness.toml stay safe
# (gated/forbidden) for human-reviewed repos like the DAW. This closes the loop:
#   verify_gate   -> skip the mid-run "perceive the result" gate; flow to publish.
#   mark_pr_ready -> the overseer promotes the aggregated wave PR draft -> ready.
#   merge_to_main -> the pr_review loop reviews that wave PR and MERGES it to main.
# The hard pre-merge bar still holds: mergeable + green CI + an AI review with no
# blocking issues, and only THIS instance's own wave PRs. Dial merge_to_main back to
# "gated" for a human approve per merge, or remove it to revert to human-merge.
[overrides.autonomy]
verify_gate = "autonomous"
mark_pr_ready = "autonomous"
merge_to_main = "autonomous"
